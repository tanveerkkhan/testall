apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.service.app }}
  name: {{ .Values.service.app }}
spec:
  ports:
  - port: {{ .Values.service.containerPort }}
    protocol: TCP
    targetPort: {{ .Values.service.containerPort }}
  selector:
    app: {{ .Values.service.app }}
  type: {{ .Values.service.type }}
